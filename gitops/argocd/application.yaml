apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-web-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/molnar228/open-data-ai-analytics.git'
    targetRevision: HEAD
    path: gitops/app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: lab-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true