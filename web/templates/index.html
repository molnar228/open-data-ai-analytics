<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Дашборд Спортивної Аналітики</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; background-color: #f4f4f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { flex: 1; min-width: 300px; padding: 15px; background: #eef2f5; border-radius: 5px; }
        img { max-width: 100%; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Результати аналізу даних (Docker Lab)</h1>

        <div class="grid">
            <div class="card">
                <h2>Перевірка якості (Quality)</h2>
                <pre>{{ quality | tojson(indent=2) }}</pre>
            </div>

            <div class="card">
                <h2>Дослідження (Research)</h2>
                <pre>{{ research | tojson(indent=2) }}</pre>
            </div>
        </div>

        <h2>Візуалізації</h2>
        <div class="grid">
            <div>
                <h3>Розподіл за статтю</h3>
                <img src="{{ url_for('serve_plot', filename='gender_distribution.png') }}" alt="Gender">
            </div>
            <div>
                <h3>Розподіл за званнями</h3>
                <img src="{{ url_for('serve_plot', filename='titles_distribution.png') }}" alt="Titles">
            </div>
        </div>
    </div>
</body>
</html>
