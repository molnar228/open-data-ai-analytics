name: CI (Self-hosted)

on:
  workflow_dispatch:

jobs:
  run-local:
    runs-on: self-hosted 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies locally
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          if exist requirements.txt pip install -r requirements.txt

      - name: Run module locally
        shell: cmd
        run: |
          if not exist artifacts\local mkdir artifacts\local
          echo "Запускаємо на локальному ПК!" > artifacts\local\run.log
          python data_load.py >> artifacts\local\run.log 2>&1 || echo "Скрипт виконано (або пропущено)"

      - name: Upload local artifacts
        uses: actions/upload-artifact@v4
        with:
          name: results-selfhosted
          path: artifacts\local
